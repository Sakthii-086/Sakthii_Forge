<!DOCTYPE html>
<html>

<head>

    <title>Weather Prediction System</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🌦 Weather Prediction System</h1>

<p>Artificial Intelligence & Data Science Project</p>

<form action="/predict" method="POST">

<input
type="number"
name="day"
placeholder="Enter Day Number"
required>

<button>

Predict Weather

</button>

</form>

{% if prediction %}

<div class="card">

<h2>Prediction Result</h2>

<h3>Day : {{day}}</h3>

<h3>Temperature : {{prediction}} °C</h3>

<h3>{{condition}}</h3>

</div>

{% endif %}

</div>

</body>

</html>
